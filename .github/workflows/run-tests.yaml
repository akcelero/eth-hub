name: Run tests

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  run_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

      - name: Run ty
        run: uv run ty check src

      - name: format
        run: uv run ruff format --check src
